steps:
  # Pull :latest for cache (single pull — inline cache covers all stages including admin-build)
  - name: 'gcr.io/cloud-builders/docker'
    id: pull-cache
    entrypoint: bash
    args:
      - '-c'
      - 'docker pull $_IMAGE:latest || true'

  # Single build — Node stage hits inline cache from :latest; Python layer hits if pyproject unchanged
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    waitFor: [pull-cache]
    args:
      - build
      - --cache-from=$_IMAGE:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - -t=$_IMAGE:latest
      - -t=$_IMAGE:$COMMIT_SHA
      - .
    env:
      - DOCKER_BUILDKIT=1

  # Push :latest — required before deploy
  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    waitFor: [build]
    args: [push, '$_IMAGE:latest']

  # Deploy and push :COMMIT_SHA run in parallel once :latest is available
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    waitFor: [push-latest]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - faculty-appraisal-git
      - --image=$_IMAGE:latest
      - --region=asia-south1
      - --add-cloudsql-instances=facultyappraisal-495011:asia-south1:faculty-appraisal-db
      - --allow-unauthenticated
      - --quiet

  - name: 'gcr.io/cloud-builders/docker'
    id: push-sha
    waitFor: [push-latest]
    args: [push, '$_IMAGE:$COMMIT_SHA']

substitutions:
  _IMAGE: asia-south1-docker.pkg.dev/facultyappraisal-495011/faculty-appraisal-repo/faculty-appraisal-git

images:
  - $_IMAGE:latest
  - $_IMAGE:$COMMIT_SHA

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
