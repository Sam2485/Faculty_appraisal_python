steps:
  # Pull all cache images in one shot (|| true so first build doesn't fail)
  - name: 'gcr.io/cloud-builders/docker'
    id: pull-cache
    entrypoint: bash
    args:
      - '-c'
      - |
        docker pull $_IMAGE:npm-cache || true
        docker pull $_IMAGE:latest || true

  # Build only the Node stage and tag it as npm-cache.
  # This makes `npm ci` a cache hit on every push where package.json hasn't changed,
  # even though that stage doesn't appear in the final image.
  - name: 'gcr.io/cloud-builders/docker'
    id: build-npm-cache
    waitFor: [pull-cache]
    args:
      - build
      - --target=admin-build
      - --cache-from=$_IMAGE:npm-cache
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - -t=$_IMAGE:npm-cache
      - .
    env:
      - DOCKER_BUILDKIT=1

  # Full build — cache hits for both the Node stage (npm-cache) and the Python
  # deps layer (latest), so only changed layers are rebuilt.
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    waitFor: [build-npm-cache]
    args:
      - build
      - --cache-from=$_IMAGE:npm-cache
      - --cache-from=$_IMAGE:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - -t=$_IMAGE:latest
      - -t=$_IMAGE:$COMMIT_SHA
      - .
    env:
      - DOCKER_BUILDKIT=1

  # Push :latest — required before deploy can reference the image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    waitFor: [build]
    args: [push, '$_IMAGE:latest']

  # Push npm-cache in parallel with deploy — updates the cache for next build
  - name: 'gcr.io/cloud-builders/docker'
    id: push-npm-cache
    waitFor: [build]
    args: [push, '$_IMAGE:npm-cache']

  # Deploy to Cloud Run — starts as soon as :latest is pushed
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    waitFor: [push-latest]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - faculty-appraisal-git
      - --image=$_IMAGE:latest
      - --region=asia-south1
      - --add-cloudsql-instances=facultyappraisal-495011:asia-south1:faculty-appraisal-db
      - --allow-unauthenticated
      - --quiet

  # Push :COMMIT_SHA in parallel with deploy — only needed for rollback reference
  - name: 'gcr.io/cloud-builders/docker'
    id: push-sha
    waitFor: [push-latest]
    args: [push, '$_IMAGE:$COMMIT_SHA']

substitutions:
  _IMAGE: asia-south1-docker.pkg.dev/facultyappraisal-495011/faculty-appraisal-repo/faculty-appraisal-git

images:
  - $_IMAGE:latest
  - $_IMAGE:$COMMIT_SHA

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
