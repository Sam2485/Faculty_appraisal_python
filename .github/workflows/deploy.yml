name: CI/CD to GCP Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: faculty-appraisal-backend
  ARTIFACT_REPO: faculty-appraisal-repo
  CLOUD_SQL_INSTANCE: ${{ secrets.GCP_PROJECT_ID }}:${{ secrets.GCP_REGION }}:faculty-appraisal-db

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: Authorize Docker
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

    - name: Build and Push Container
      run: |
        DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
        docker build -t $DOCKER_TAG .
        docker push $DOCKER_TAG
        echo "IMAGE_URL=$DOCKER_TAG" >> $GITHUB_ENV

    - name: Deploy to Cloud Run
      id: deploy
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: '${{ env.SERVICE_NAME }}'
        region: '${{ env.REGION }}'
        image: '${{ env.IMAGE_URL }}'
        flags: '--add-cloudsql-instances=${{ env.CLOUD_SQL_INSTANCE }}'
        env_vars: |
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          USE_LOCAL_AUTH=true
          ALLOW_MOCK_USER=false
          APP_URL=${{ secrets.APP_URL }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GCP_STORAGE_BUCKET=${{ secrets.GCP_STORAGE_BUCKET }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM=${{ secrets.SMTP_USER }}
